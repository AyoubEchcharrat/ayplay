<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wild Cards</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ── Lobby ─────────────────────────────────────────────────────── -->
<div id="screen-lobby">
  <h1>Wild Cards</h1>
  <p class="subtitle">Jeu de cartes — 2 joueurs</p>
  <input id="input-room" type="text" placeholder="Code de la room (ex: abc123)" maxlength="20" autocomplete="off"/>
  <button id="btn-join">Rejoindre</button>
  <p id="lobby-status"></p>
</div>

<!-- ── Jeu ───────────────────────────────────────────────────────── -->
<div id="screen-game" class="hidden">

  <!-- Ligne adversaire -->
  <div class="player-row" id="opp-row">
    <div id="opp-player-zone" class="player-info">
      <span class="hp-badge" id="opp-hp-badge">♥ <span id="opp-hp">20</span></span>
      <span class="deck-badge">🂠 <span id="opp-deck">—</span></span>
      <span class="hand-badge">✋ <span id="opp-hand-count">—</span></span>
    </div>
    <div class="modifier-slots">
      <div id="opp-terrain" class="modifier-slot"></div>
      <div id="opp-state"   class="modifier-slot"></div>
    </div>
  </div>

  <!-- Board adversaire -->
  <div id="opp-board-zone" class="board-zone">
    <div id="opp-animals" class="animals-row"></div>
  </div>

  <!-- Séparateur central -->
  <div id="mid-bar">
    <span id="turn-indicator">—</span>
  </div>

  <!-- Board joueur -->
  <div id="my-board-zone" class="board-zone clickable-zone">
    <div id="my-animals" class="animals-row"></div>
    <div id="play-hint-zone">Jouez ici</div>
  </div>

  <!-- Ligne joueur -->
  <div class="player-row" id="my-row">
    <div class="player-info">
      <span class="hp-badge" id="my-hp-badge">♥ <span id="my-hp">20</span></span>
      <span class="deck-badge">🂠 <span id="my-deck">—</span></span>
      <button id="btn-end-turn" disabled>Fin de tour</button>
    </div>
    <div class="modifier-slots">
      <div id="my-terrain" class="modifier-slot"></div>
      <div id="my-state"   class="modifier-slot"></div>
    </div>
  </div>

  <!-- Main -->
  <div id="hand-zone">
    <div id="hand"></div>
  </div>

  <!-- Barre du bas -->
  <div id="bottom-bar">
    <div id="log-zone"></div>
    <div id="hint-zone"></div>
  </div>

</div>

<!-- ── Overlay fin de partie ─────────────────────────────────────── -->
<div id="overlay" class="hidden">
  <div class="overlay-box">
    <div id="overlay-msg"></div>
    <button onclick="location.reload()">Rejouer</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="assets/icons.js"></script>
<script src="game.js"></script>
</body>
</html>
